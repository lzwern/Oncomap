<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Sandbox</title>
    <script>
        async function loadData() {
            let data;
            try {
                // Attempt to load data from local JSON file
                const response = await fetch('./data/data.json');
                if (!response.ok) throw new Error('Failed to load local data');
                data = await response.json();
            } catch (error) {
                console.error(error);
                // Fallback to live API endpoints
                const apiEndpoints = [
                    'https://api.example.com/centers',
                    'https://api.example.com/oncos',
                    'https://api.example.com/viszes',
                    'https://api.example.com/uros',
                    'https://api.example.com/partners',
                ];
                const fetchPromises = apiEndpoints.map(endpoint => fetch(endpoint).then(res => res.json()));
                const results = await Promise.all(fetchPromises);
                data = results;
            }

            // Display data (for demo purposes)
            console.log(data);
            // You can add more code here to display your data on the webpage
        }

        window.onload = loadData;
    </script>
</head>
<body>
    <h1>Dev Sandbox</h1>
    <div id="data-display"></div>
</body>
</html>
